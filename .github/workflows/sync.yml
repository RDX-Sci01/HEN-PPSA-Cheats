name: Sync HEN Cheats (PPSA Advanced Catalog)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream
        run: |
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # ----------------------------------------------------
      # FILTER PPSA FILES
      # ----------------------------------------------------
      - name: Build filtered PPSA collections
        run: |
          set -e

          rm -rf cheats
          mkdir -p cheats/mc4 cheats/json cheats/shn

          SRC="upstream/cheats"

          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/" \;
            fi

            if [ -f "$SRC/$txtfile" ]; then
              grep '^PPSA' "$SRC/$txtfile" > "cheats/$txtfile" || true
            fi
          }

          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      # ----------------------------------------------------
      # GENERATE PPSA CATALOG TABLE
      # ----------------------------------------------------
      - name: Generate PPSA game catalog
        run: |
          set -e

          DATE=$(date -u +%F)
          OUT="cheats/GAME_TABLE.md"
          TMP=$(mktemp)

          echo "| Date | Status | ID | Version | Title | Category |" > $OUT
          echo "|------|--------|----|---------|-------|----------|" >> $OUT

          for category in mc4 json shn; do
            if [ -d "cheats/$category" ]; then
              for file in cheats/$category/PPSA*; do
                [ -e "$file" ] || continue

                filename=$(basename "$file")
                ID=$(echo "$filename" | cut -d'_' -f1)

                # extract metadata line
                LINE=$(grep "^$ID" cheats/$category.txt 2>/dev/null | head -n1)

                if [ -n "$LINE" ]; then
                  TITLE=$(echo "$LINE" | cut -d'=' -f2)
                  META=$(echo "$LINE" | cut -d'=' -f1)
                  VERSION=$(echo "$META" | cut -d'_' -f2 | cut -d'.' -f1-3)
                else
                  TITLE="Unknown"
                  VERSION=$(echo "$filename" | cut -d'_' -f2 | cut -d'.' -f1-3)
                fi

                echo "$DATE|$ID|$VERSION|$TITLE|$category" >> $TMP
              done
            fi
          done

          # deduplicate by ID + sort
          sort -t'|' -k2,2 -u $TMP | sort -t'|' -k2,2 > TMP_SORTED

          while IFS='|' read -r date id version title category; do
            echo "| $date | ADDED | $id | $version | $title | $category |" >> $OUT
          done < TMP_SORTED

          rm -f $TMP TMP_SORTED

      # ----------------------------------------------------
      # INJECT INTO README
      # ----------------------------------------------------
      - name: Inject catalog into README
        run: |
          set -e

          if ! grep -q "<!-- GAME_TABLE -->" README.md; then
            echo "Missing <!-- GAME_TABLE --> in README"
            exit 1
          fi

          sed '/<!-- GAME_TABLE -->/r cheats/GAME_TABLE.md' README.md | \
          sed '/<!-- GAME_TABLE -->/d' > README.tmp

          mv README.tmp README.md

      # ----------------------------------------------------
      # COMMIT & PUSH
      # ----------------------------------------------------
      - name: Commit and push updates
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md cheats

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update PPSA catalog (filtered + deduped + sorted)"
          git push origin HEAD --force
