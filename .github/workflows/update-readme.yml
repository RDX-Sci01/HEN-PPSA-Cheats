name: Sync Upstream README

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch upstream README
        run: |
          curl -fLsS https://raw.githubusercontent.com/TeeKay87/HEN-Cheats-Collection/master/README.md -o upstream.md

      - name: Build collapsible block
        run: |
          rm -f block.txt
          printf "%s\n" "## 📦 Upstream Cheats" >> block.txt
          printf "%s\n" "<!-- UPSTREAM:START -->" >> block.txt
          printf "%s\n" "<details>" >> block.txt
          printf "%s\n" "<summary>Click to expand upstream README</summary>" >> block.txt
          printf "%s\n" "```markdown" >> block.txt

          while IFS= read -r line; do
            # Escape triple backticks inside upstream README
            safe_line=${line//\`\`\`/\`\`\`/}
            printf "%s\n" "$safe_line" >> block.txt
          done < upstream.md

          printf "%s\n" "```" >> block.txt
          printf "%s\n" "</details>" >> block.txt
          printf "%s\n" "<!-- UPSTREAM:END -->" >> block.txt

      - name: Inject into README
        run: |
          awk '
          BEGIN {
            while ((getline line < "block.txt") > 0) {
              block = block line "\n"
            }
            close("block.txt")
            skip = 0
          }

          /<!-- UPSTREAM:START -->/ {
            print
            printf "%s", block
            skip = 1
            next
          }

          /<!-- UPSTREAM:END -->/ {
            skip = 0
          }

          skip == 0 { print }
          ' README.md > README.tmp

          mv README.tmp README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Auto sync upstream README" && git push origin HEAD
