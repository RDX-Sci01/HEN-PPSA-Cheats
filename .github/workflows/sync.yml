name: Sync HEN Cheats (PPSA Clean Catalog)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream
        run: |
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # ----------------------------------------------------
      # FILTER PPSA FILES
      # ----------------------------------------------------
      - name: Build filtered PPSA collections
        run: |
          set -e

          rm -rf cheats
          mkdir -p cheats

          SRC="upstream/cheats"

          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            mkdir -p "cheats/$folder/files"

            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/files/" \;
            fi

            if [ -f "$SRC/$txtfile" ]; then
              grep '^PPSA' "$SRC/$txtfile" > "cheats/$folder/$txtfile" || true
            fi
          }

          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      # ----------------------------------------------------
      # GENERATE GAME CATALOG (FIXED)
      # ----------------------------------------------------
      - name: Generate PPSA game catalog
        run: |
          set -e

          OUT="cheats/GAME_TABLE.md"
          TMP=$(mktemp)

          for category in mc4 json shn; do
            FILE_DIR="cheats/$category/files"
            META_FILE="cheats/$category/$category.txt"

            [ -d "$FILE_DIR" ] || continue

            for file in "$FILE_DIR"/PPSA*; do
              [ -e "$file" ] || continue

              filename=$(basename "$file")
              ID="${filename%%_*}"

              LINE=$(grep "^$ID" "$META_FILE" 2>/dev/null | head -n1)

              if [ -n "$LINE" ]; then
                TITLE="${LINE#*=}"
                META=$(echo "$LINE" | cut -d'_' -f2)
                VERSION=$(echo "$META" | cut -d'.' -f1-3)
              else
                TITLE="Unknown"
                VERSION=$(echo "$filename" | cut -d'_' -f2 | cut -d'.' -f1-3)
              fi

              [ -z "$ID" ] && continue

              echo "$ID|$VERSION|$TITLE|$category" >> "$TMP"
            done
          done

          sort -t'|' -k1,1 -u "$TMP" > TMP_SORTED

          {
            echo "| ID | Version | Title | Category |"
            echo "|----|---------|-------|----------|"

            while IFS='|' read -r id version title category; do
              [ -z "$id" ] && continue
              echo "| $id | $version | $title | $category |"
            done < TMP_SORTED

            echo ""
          } > "$OUT"

          rm -f "$TMP" TMP_SORTED

      # ----------------------------------------------------
      # TIMESTAMP
      # ----------------------------------------------------
      - name: Generate timestamp
        run: |
          date -u '+🕒 Last Updated: %Y-%m-%d %H:%M UTC' > cheats/TIMESTAMP.md

      # ----------------------------------------------------
      # README INJECTION (FULL REPLACE MODE)
      # ----------------------------------------------------
      - name: Inject catalog into README safely (replace mode)
        run: |
          set -e

          # Ensure placeholder exists
          if ! grep -q "<!-- GAME_TABLE -->" README.md; then
            printf "\n## 📊 PPSA Game Catalog\n<!-- GAME_TABLE -->\n" >> README.md
          fi

          # FULL REPLACE after placeholder
          awk '
            /<!-- GAME_TABLE -->/ {
              print "<!-- GAME_TABLE -->"
              print ""

              while ((getline line < "cheats/TIMESTAMP.md") > 0)
                print line

              print ""

              while ((getline line < "cheats/GAME_TABLE.md") > 0)
                print line

              next
            }

            # keep everything BEFORE placeholder, drop old table completely
            { print }
          ' README.md > README.tmp

          mv README.tmp README.md

      # ----------------------------------------------------
      # COMMIT & PUSH
      # ----------------------------------------------------
      - name: Commit and push changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md cheats

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update PPSA catalog (full replace sync)"
          git push origin HEAD --force-with-lease
