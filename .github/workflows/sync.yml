name: Sync HEN Cheats (PPSA Clean Catalog)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream
        run: |
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # ----------------------------------------------------
      # FILTER PPSA FILES
      # ----------------------------------------------------
      - name: Build filtered PPSA collections
        run: |
          set -e

          rm -rf cheats
          mkdir -p cheats/mc4 cheats/json cheats/shn

          SRC="upstream/cheats"

          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/" \;
            fi

            if [ -f "$SRC/$txtfile" ]; then
              grep '^PPSA' "$SRC/$txtfile" > "cheats/$txtfile" || true
            fi
          }

          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      # ----------------------------------------------------
      # GENERATE CLEAN CATALOG
      # ----------------------------------------------------
      - name: Generate PPSA game catalog
        run: |
          set -e

          OUT="cheats/GAME_TABLE.md"
          TMP=$(mktemp)

          echo "| ID | Version | Title | Category |" > $OUT
          echo "|----|---------|-------|----------|" >> $OUT

          for category in mc4 json shn; do
            if [ -d "cheats/$category" ]; then
              for file in cheats/$category/PPSA*; do
                [ -e "$file" ] || continue

                filename=$(basename "$file")
                ID=$(echo "$filename" | cut -d'_' -f1)

                # find metadata line: PPSAxxxx_version.ext=Title
                LINE=$(grep "^$ID" cheats/$category.txt 2>/dev/null | head -n1)

                if [ -n "$LINE" ]; then
                  TITLE=$(echo "$LINE" | cut -d'=' -f2)
                  META=$(echo "$LINE" | cut -d'_' -f2)
                  VERSION=$(echo "$META" | cut -d'.' -f1-3)
                else
                  TITLE="Unknown"
                  VERSION=$(echo "$filename" | cut -d'_' -f2 | cut -d'.' -f1-3)
                fi

                echo "$ID|$VERSION|$TITLE|$category" >> $TMP
              done
            fi
          done

          # deduplicate + sort by ID
          sort -t'|' -k1,1 -u $TMP | sort -t'|' -k1,1 > TMP_SORTED

          while IFS='|' read -r id version title category; do
            echo "| $id | $version | $title | $category |" >> $OUT
          done < TMP_SORTED

          rm -f $TMP TMP_SORTED

      # ----------------------------------------------------
      # READ TIME STAMP
      # ----------------------------------------------------
      - name: Generate timestamp
        run: |
          echo "🕒 Last Updated: $(date -u '+%Y-%m-%d %H:%M UTC')" > cheats/TIMESTAMP.md

      # ----------------------------------------------------
      # SAFE README INJECTION (SCROLLABLE)
      # ----------------------------------------------------
      - name: Inject catalog into README safely
        run: |
          set -e

          # ensure placeholder exists
          if ! grep -q "<!-- GAME_TABLE -->" README.md; then
            echo "" >> README.md
            echo "## 📊 PPSA Game Catalog" >> README.md
            echo "<!-- GAME_TABLE -->" >> README.md
          fi

          awk '
            /<!-- GAME_TABLE -->/ {
              print
              print ""
              while ((getline line < "cheats/TIMESTAMP.md") > 0)
                print line

              print ""
              print "<div style=\"max-height:500px; overflow:auto; border:1px solid #ccc; padding:5px\">"

              while ((getline line < "cheats/GAME_TABLE.md") > 0)
                print line

              print "</div>"
              next
            }
            { print }
          ' README.md > README.tmp

          mv README.tmp README.md

      # ----------------------------------------------------
      # COMMIT & PUSH
      # ----------------------------------------------------
      - name: Commit and push changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md cheats

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update PPSA catalog (clean + scrollable + timestamp)"
          git push origin HEAD --force
