name: Sync HEN Cheats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # silence Node 20 deprecation warning; remove after June 16 2026

defaults:
  run:
    shell: bash

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # 1️⃣ Checkout repo 
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # --------------------------
      # 2️⃣ Configure git (once, up front)
      # --------------------------
      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # --------------------------
      # 3️⃣ Clone upstream repo
      # --------------------------
      - name: Clone upstream
        run: |
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # --------------------------
      # 4️⃣ Filter PPSA cheats
      # --------------------------
      - name: Build filtered collections
        run: |
          rm -rf cheats
          mkdir -p cheats/mc4 cheats/json cheats/shn

          SRC="upstream/cheats"

          # Shared helper: strip leading/trailing whitespace and carriage returns
          trim() {
            echo "$1" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          # filter_ppsa(): copy PPSA* files and grep PPSA lines from .txt
          # Logs a count so we can spot upstream structural changes.
          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            if [ -d "$SRC/$folder" ]; then
              count=$(find "$SRC/$folder" -type f -name 'PPSA*' | wc -l)
              echo "Found $count PPSA file(s) in $folder"
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/" \;
            else
              echo "WARNING: upstream folder '$folder' not found — skipping file copy"
            fi

            if [ -f "$SRC/$txtfile" ]; then
              grep '^PPSA' "$SRC/$txtfile" > "cheats/$txtfile" || true
              echo "Filtered $(wc -l < "cheats/$txtfile") PPSA line(s) from $txtfile"
            else
              echo "WARNING: upstream file '$txtfile' not found — skipping txt filter"
            fi
          }

          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      # --------------------------
      # 5️⃣ Download upstream README
      # --------------------------
      - name: Download upstream README
        run: |
          mkdir -p docs
          curl -fLsS --max-time 30 \
            https://raw.githubusercontent.com/TeeKay87/HEN-Cheats-Collection/master/README.md \
            -o docs/upstream.md

      # --------------------------
      # 6️⃣ Build README.md with cheat tables
      # --------------------------
      - name: Build README with cheat tables
        run: |
          sync_time=$(date -u '+%Y-%m-%d %H:%M UTC')

          # trim(): strip leading/trailing whitespace and carriage returns
          trim() {
            echo "$1" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          # count_entries(): return number of non-blank lines in a file
          count_entries() {
            local file="$1"
            [ -f "$file" ] && grep -c '.' "$file" || echo 0
          }

          # make_table(): render all entries of a .txt as a markdown table
          # wrapped in a <details> collapsible block
          make_table() {
            local file="$1"
            local header="$2"
            local total
            total=$(count_entries "$file")

            echo "<details>"
            echo "<summary><strong>${header}</strong> — ${total} entries</summary>"
            echo ""

            if [ ! -f "$file" ] || [ ! -s "$file" ]; then
              echo "_No entries found._"
              echo ""
              echo "</details>"
              echo ""
              return
            fi

            echo "| File | Game |"
            echo "|------|------|"

            while IFS= read -r line; do
              [ -z "$line" ] && continue
              filename="${line%%=*}"
              game="${line#*=}"
              filename=$(trim "$filename")
              game=$(trim "$game")
              echo "| \`${filename}\` | ${game} |"
            done < "$file"

            echo ""
            echo "</details>"
            echo ""
          }

          {
            # ---- Static header (preserved exactly) ----
            printf '%s\n' '<p align="center"><img src="docs/hen_ppsa_cheats_logo.svg" alt="HEN PPSA Cheats Logo" width="850"></p>'
            printf '%s\n' ''
            printf '%s\n' '# HEN PPSA Cheats 🔄 Auto Sync [![Sync Cheats](https://img.shields.io/badge/Sync%20Now-blue?style=for-the-badge)](https://github.com/RDX-Sci01/HEN-PPSA-Cheats/actions/workflows/sync.yml)'
            printf '%s\n' 'This repository automatically syncs and filters **PPSA native** cheat data from:'
            printf '%s\n' 'https://github.com/TeeKay87/HEN-Cheats-Collection'
            printf '%s\n' '---'
            printf '%s\n' '## 📁 What it includes'
            printf '%s\n' 'Only **PPSA entries** are kept from:'
            printf '%s\n' '- mc4'
            printf '%s\n' '- json'
            printf '%s\n' '- shn'
            printf '%s\n' ''
            printf '%s\n' 'Both:'
            printf '%s\n' '- `PPSA*` files'
            printf '%s\n' '- `PPSA` lines in `.txt` files'
            printf '%s\n' '---'
            printf '%s\n' ''

            # ---- Auto-generated tables ----
            echo "## 📋 Cheat Lists"
            echo ""
            echo "> Last updated: **${sync_time}**"
            echo "> 📄 [View full list on GitHub Pages](https://rdx-sci01.github.io/HEN-PPSA-Cheats)"
            echo ""
            make_table "cheats/mc4.txt" "MC4 Cheats"
            make_table "cheats/shn.txt" "SHN Cheats"
            make_table "cheats/json.txt" "JSON Cheats"
            echo "---"
            echo ""
            echo "_Tables auto-generated by GitHub Actions on every sync._"
          } > README.md

      # --------------------------
      # 7️⃣ Build GitHub Pages dashboard
      # --------------------------
      - name: Build GitHub Pages site
        run: |
          escaped=$(sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' docs/upstream.md)
          sync_time=$(date -u '+%Y-%m-%d %H:%M UTC')

          # trim(): strip leading/trailing whitespace and carriage returns
          trim() {
            echo "$1" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          # make_html_table(): parse .txt into a full HTML table
          make_html_table() {
            local file="$1"

            if [ ! -f "$file" ] || [ ! -s "$file" ]; then
              echo "<p><em>No entries found.</em></p>"
              return
            fi

            echo "<table>"
            echo "<thead><tr><th>File</th><th>Game</th></tr></thead>"
            echo "<tbody>"

            while IFS= read -r line; do
              [ -z "$line" ] && continue
              filename="${line%%=*}"
              game="${line#*=}"
              filename=$(trim "$filename")
              game=$(trim "$game")
              filename_esc=$(printf '%s' "$filename" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
              game_esc=$(printf '%s' "$game"         | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
              echo "<tr><td><code>${filename_esc}</code></td><td>${game_esc}</td></tr>"
            done < "$file"

            echo "</tbody></table>"
          }

          mc4_table=$(make_html_table "cheats/mc4.txt")
          shn_table=$(make_html_table "cheats/shn.txt")
          json_table=$(make_html_table "cheats/json.txt")

          cat > docs/index.html <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>HEN Cheats Dashboard</title>
            <style>
              body     { font-family: Arial, sans-serif; margin: 20px; max-width: 1000px; }
              h1, h2   { color: #333; }
              a        { color: #1e88e5; }
              pre      { background: #111; color: #eee; padding: 15px;
                         white-space: pre-wrap; overflow-x: auto; border-radius: 6px; }
              table    { border-collapse: collapse; width: 100%; margin-bottom: 2em; }
              th       { background: #1e88e5; color: #fff; padding: 8px 12px; text-align: left; }
              td       { padding: 6px 12px; border-bottom: 1px solid #ddd; }
              tr:nth-child(even) td { background: #f5f5f5; }
              code     { font-size: 0.85em; background: #eee; padding: 2px 4px; border-radius: 3px; }
              .meta    { color: #888; font-size: 0.9em; }
              input    { width: 100%; padding: 8px; margin-bottom: 16px; font-size: 1em;
                         border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
              .logo    { display: block; margin: 0 auto 24px; max-width: 400px; width: 100%; }
            </style>
          </head>
          <body>
            <img src="hen_ppsa_cheats_logo.svg" alt="HEN PPSA Cheats Logo" class="logo">
            <h1 style="text-align:center;">HEN Cheats — Auto Synced (PPSA only)</h1>

            <h2>📥 Download Latest Cheats</h2>
            <p>
              <a href="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/cheats.zip">
                ⬇ cheats.zip (latest release)
              </a>
            </p>

            <input type="text" id="search" placeholder="🔍 Search by filename or game title..." oninput="filterTables()">

            <h2>🎮 MC4 Cheats</h2>
            ${mc4_table}

            <h2>🎮 SHN Cheats</h2>
            ${shn_table}

            <h2>🎮 JSON Cheats</h2>
            ${json_table}

            <h2>📦 Upstream README</h2>
            <pre>${escaped}</pre>

            <p class="meta">Last sync: ${sync_time}</p>

            <script>
              function filterTables() {
                const q = document.getElementById('search').value.toLowerCase();
                document.querySelectorAll('tbody tr').forEach(row => {
                  row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
                });
              }
            </script>
          </body>
          </html>
          HTML

      # --------------------------
      # 8️⃣ Commit all changes in one push
      #    Stages cheats/, README.md, docs/ — never .github/workflows/
      # --------------------------
      - name: Commit all changes
        run: |
          git add cheats/ README.md docs/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync upstream cheats + update README and Pages [skip ci]"
            git push origin HEAD --force-with-lease
          fi

      # --------------------------
      # 9️⃣ Zip cheats folder
      # --------------------------
      - name: Zip cheats folder
        run: zip -r cheats.zip cheats/

      # --------------------------
      # 🔟 Delete old rolling release
      # --------------------------
      - name: Delete old release if exists
        uses: dev-drprasad/delete-tag-and-release@v1.1
        continue-on-error: true  # safe on first run when no release exists yet
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------
      # 1️⃣1️⃣ Create rolling release 
      # --------------------------
      - name: Create rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "HEN Cheats (Latest)"
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Auto-updated PPSA cheats collection.
            Always contains the latest synced MC4, JSON, and SHN data.
          files: cheats.zip
