name: Sync HEN Cheats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # 1️⃣ Checkout your repo
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # 2️⃣ Clone upstream repo
      # --------------------------
      - name: Clone upstream
        run: |
          set -e
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # --------------------------
      # 3️⃣ Filter PPSA cheats
      # --------------------------
      - name: Build filtered collections
        run: |
          set -e

          rm -rf cheats
          mkdir -p cheats/mc4 cheats/json cheats/shn

          SRC="upstream/cheats"

          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/" \;
            fi

            if [ -f "$SRC/$txtfile" ]; then
              grep '^PPSA' "$SRC/$txtfile" > "cheats/$txtfile" || true
            fi
          }

          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      # --------------------------
      # 4️⃣ Commit & push cheats
      # --------------------------
      - name: Commit and force push changes
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A cheats

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Sync upstream cheats (PPSA only)"
          git push origin HEAD --force

      # --------------------------
      # 5️⃣ Zip cheats folder
      # --------------------------
      - name: Zip cheats folder
        run: zip -r cheats.zip cheats

      # --------------------------
      # 6️⃣ Delete old rolling release
      # --------------------------
      - name: Delete old release if exists
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------
      # 7️⃣ Create rolling release
      # --------------------------
      - name: Create single rolling release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "HEN Cheats (Latest)"
          body: |
            Auto-updated PPSA cheats collection.
            Always contains the latest synced MC4, JSON, SHN data.
          files: cheats.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------
      # 8️⃣ Build GitHub Pages dashboard
      # --------------------------
      - name: Build GitHub Pages site
        run: |
          set -e
          mkdir -p docs

          # Fetch upstream README
          UPSTREAM_README=$(curl -s https://raw.githubusercontent.com/TeeKay87/HEN-Cheats-Collection/master/README.md)

          # Build index.html                
          {
            printf "%s\n" "<!DOCTYPE html>"
            printf "%s\n" "<html>"
            printf "%s\n" "<head>"
            printf "%s\n" "<meta charset='utf-8'>"
            printf "%s\n" "<title>HEN Cheats Dashboard</title>"
            printf "%s\n" "<style>"
            printf "%s\n" "body { font-family: Arial, sans-serif; margin: 20px; }"
            printf "%s\n" "pre { background: #111; color: #eee; padding: 15px; white-space: pre-wrap; overflow-x: auto; }"
            printf "%s\n" "h1 { color: #333; }"
            printf "%s\n" "a { color: #1e88e5; }"
            printf "%s\n" "</style>"
            printf "%s\n" "</head>"
            printf "%s\n" "<body>"

            printf "%s\n" "<h1>HEN Cheats (Auto Synced)</h1>"

            printf "%s\n" "<h2>📦 Upstream README</h2>"
            printf "%s\n" "<pre>"

            # Print README safely line-by-line (NO parsing issues)
            while IFS= read -r line; do
              printf "%s\n" "$line"
            done < upstream.md

            printf "%s\n" "</pre>"

            printf "%s\n" "<h2>📥 Download Latest Cheats</h2>"
            printf "%s\n" "<p><a href='https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/cheats.zip'>Download cheats.zip</a></p>"

            printf "%s\n" "<p>Last sync: $(date)</p>"

            printf "%s\n" "</body>"
            printf "%s\n" "</html>"
          } > docs/index.html
          
      # 9️⃣ Commit GitHub Pages update
      # --------------------------
      - name: Commit Pages update
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs

          if git diff --cached --quiet; then
            echo "No Pages update"
            exit 0
          fi

          git commit -m "Auto-update GitHub Pages dashboard"
          git push origin HEAD --force
