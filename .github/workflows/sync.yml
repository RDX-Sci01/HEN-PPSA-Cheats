name: Sync HEN Cheats (PPSA Web Catalog)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream
        run: git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # ----------------------------------------------------
      # Build dataset
      # ----------------------------------------------------
      - name: Build PPSA dataset
        run: |
          set -e

          rm -rf cheats docs
          mkdir -p cheats docs

          SRC="upstream/cheats"

          for folder in mc4 json shn; do
            mkdir -p "cheats/$folder/files"

            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/files/" \;
            fi

            if [ -f "$SRC/$folder.txt" ]; then
              grep '^PPSA' "$SRC/$folder.txt" > "cheats/$folder/$folder.txt" || true
            fi
          done

      # ----------------------------------------------------
      # Generate JSON + HTML safely (NO HEREDOC)
      # ----------------------------------------------------
      - name: Generate catalog files
        run: |
          set -e

          JSON="docs/catalog.json"
          HTML="docs/index.html"
          TMP=$(mktemp)

          echo "[" > "$JSON"

          first=1

          for folder in mc4 json shn; do
            FILE_DIR="cheats/$folder/files"
            META_FILE="cheats/$folder/$folder.txt"

            [ -d "$FILE_DIR" ] || continue

            for file in "$FILE_DIR"/PPSA*; do
              [ -e "$file" ] || continue

              filename=$(basename "$file")
              ID="${filename%%_*}"

              LINE=$(grep "^$ID" "$META_FILE" 2>/dev/null | head -n1)

              if [ -n "$LINE" ]; then
                TITLE="${LINE#*=}"
                META=$(echo "$LINE" | cut -d'_' -f2)
                VERSION=$(echo "$META" | cut -d'.' -f1-3)
              else
                TITLE="Unknown"
                VERSION="Unknown"
              fi

              echo "$ID|$VERSION|$TITLE|$folder" >> "$TMP"

              # JSON safe write
              if [ $first -eq 0 ]; then
                echo "," >> "$JSON"
              fi
              first=0

              printf '  {"id":"%s","version":"%s","title":"%s","category":"%s"}' \
                "$ID" "$VERSION" "$TITLE" "$folder" >> "$JSON"
            done
          done

          echo "]" >> "$JSON"

          sort -t'|' -k1,1 -u "$TMP" > TMP_SORTED

          # ----------------------------------------------------
          # SAFE HTML (NO HEREDOC)
          # ----------------------------------------------------
          {
            printf "%s\n" "<!DOCTYPE html>"
            printf "%s\n" "<html>"
            printf "%s\n" "<head>"
            printf "%s\n" "<meta charset=\"UTF-8\">"
            printf "%s\n" "<title>PPSA Catalog</title>"
            printf "%s\n" "<style>"
            printf "%s\n" "body { font-family: Arial; margin: 20px; }"
            printf "%s\n" "input { padding: 10px; width: 300px; margin-bottom: 15px; }"
            printf "%s\n" ".box { max-height: 500px; overflow-y: auto; border: 1px solid #ccc; }"
            printf "%s\n" "table { width: 100%%; border-collapse: collapse; }"
            printf "%s\n" "th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }"
            printf "%s\n" "th { background: #f4f4f4; position: sticky; top: 0; }"
            printf "%s\n" "</style>"
            printf "%s\n" "</head>"
            printf "%s\n" "<body>"
            printf "%s\n" "<h2>PPSA Game Catalog</h2>"
            printf "%s\n" "<input id=\"search\" onkeyup=\"filter()\" placeholder=\"Search...\">"
            printf "%s\n" "<div class=\"box\"><table><thead><tr><th>ID</th><th>Version</th><th>Title</th><th>Category</th></tr></thead><tbody id=\"rows\"></tbody></table></div>"

            printf "%s\n" "<script>"
            printf "%s\n" "let data=[];"
            printf "%s\n" "fetch('catalog.json').then(r=>r.json()).then(d=>{data=d;render(d);});"

            printf "%s\n" "function render(rows){"
            printf "%s\n" "document.getElementById('rows').innerHTML=rows.map(r=>`<tr><td>\${r.id}</td><td>\${r.version}</td><td>\${r.title}</td><td>\${r.category}</td></tr>`).join('');"
            printf "%s\n" "}"

            printf "%s\n" "function filter(){"
            printf "%s\n" "let q=document.getElementById('search').value.toLowerCase();"
            printf "%s\n" "render(data.filter(r=>(r.id+r.title+r.category).toLowerCase().includes(q)));"
            printf "%s\n" "}"

            printf "%s\n" "</script>"
            printf "%s\n" "</body>"
            printf "%s\n" "</html>"
          } > "$HTML"

          rm -f "$TMP" TMP_SORTED

      # ----------------------------------------------------
      # Commit
      # ----------------------------------------------------
      - name: Commit and push
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs cheats

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "PPSA catalog (stable YAML-safe build)"
          git push origin HEAD --force-with-lease
