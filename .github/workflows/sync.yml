name: Sync HEN Cheats (PPSA Clean Catalog)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream repository
        run: |
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # ----------------------------------------------------
      # BUILD PPSA DATASET (ROBUST)
      # ----------------------------------------------------
      - name: Build PPSA dataset
        run: |
          set -e

          rm -rf cheats
          mkdir -p cheats/files

          SRC="upstream/cheats"

          # Collect all PPSA files safely (any depth, any case)
          find "$SRC" -type f -iname "*PPSA*" > cheats/ppsafiles.txt || true

          # Copy metadata index files (root-level in upstream)
          cp "$SRC/mc4.txt" cheats/ 2>/dev/null || true
          cp "$SRC/json.txt" cheats/ 2>/dev/null || true
          cp "$SRC/shn.txt" cheats/ 2>/dev/null || true

          # Copy PPSA files into staging
          while read -r file; do
            [ -f "$file" ] || continue
            cp "$file" cheats/files/
          done < cheats/ppsafiles.txt

      # ----------------------------------------------------
      # GENERATE CLEAN GAME TABLE
      # ----------------------------------------------------
      - name: Generate PPSA catalog
        run: |
          set -e

          OUT="cheats/GAME_TABLE.md"
          TMP="cheats/tmp.txt"

          rm -f "$TMP"

          get_title() {
            local id="$1"

            for f in cheats/mc4.txt cheats/json.txt cheats/shn.txt; do
              [ -f "$f" ] || continue

              LINE=$(grep -m1 "^$id" "$f" || true)

              if [ -n "$LINE" ]; then
                echo "$LINE" | sed -E 's/.*[=|]\s*//'
                return
              fi
            done

            echo "Unknown"
          }

          for file in cheats/files/*; do
            [ -e "$file" ] || continue

            filename=$(basename "$file")

            ID=$(echo "$filename" | grep -oE 'PPSA[0-9]+' || true)
            [ -z "$ID" ] && continue

            VERSION=$(echo "$filename" | grep -oE '[0-9]{2}\.[0-9]{3}\.[0-9]{3}' | head -n1)
            [ -z "$VERSION" ] && VERSION="Unknown"

            TITLE=$(get_title "$ID")

            echo "$ID|$VERSION|$TITLE|PPSA" >> "$TMP"
          done

          sort -t'|' -k1,1 -u "$TMP" > cheats/sorted.txt

          {
            echo "| ID | Version | Title | Category |"
            echo "|----|---------|-------|----------|"

            while IFS='|' read -r id version title category; do
              [ -z "$id" ] && continue
              echo "| $id | $version | $title | $category |"
            done < cheats/sorted.txt

            echo ""
          } > "$OUT"

      # ----------------------------------------------------
      # TIMESTAMP
      # ----------------------------------------------------
      - name: Generate timestamp
        run: |
          date -u '+🕒 Last Updated: %Y-%m-%d %H:%M UTC' > cheats/TIMESTAMP.md

      # ----------------------------------------------------
      # README FULL REPLACE (NO OLD TABLE EVER REMAINS)
      # ----------------------------------------------------
      - name: Inject catalog into README (FULL REBUILD)
        run: |
          set -e

          # Ensure marker exists
          if ! grep -q "<!-- GAME_TABLE -->" README.md; then
            printf "\n## 📊 PPSA Game Catalog\n<!-- GAME_TABLE -->\n" >> README.md
          fi

          # Split README at marker (everything before marker kept)
          HEADER=$(sed '/<!-- GAME_TABLE -->/q' README.md)

          {
            echo "$HEADER"
            echo ""
            cat cheats/TIMESTAMP.md
            echo ""
            cat cheats/GAME_TABLE.md
          } > README.tmp

          mv README.tmp README.md

      # ----------------------------------------------------
      # COMMIT & PUSH
      # ----------------------------------------------------
      - name: Commit and push changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md cheats

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update PPSA catalog (fully clean atomic rebuild)"
          git push origin HEAD --force-with-lease
