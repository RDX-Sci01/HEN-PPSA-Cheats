name: Sync HEN Cheats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # 1️⃣ Checkout repo
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # --------------------------
      # 2️⃣ Configure git (once, up front)
      # --------------------------
      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # --------------------------
      # 3️⃣ Clone upstream repo
      # --------------------------
      - name: Clone upstream
        run: |
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # --------------------------
      # 4️⃣ Filter PPSA cheats
      # --------------------------
      - name: Build filtered collections
        run: |
          rm -rf cheats
          mkdir -p cheats/mc4 cheats/json cheats/shn

          SRC="upstream/cheats"

          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/" \;
            fi

            if [ -f "$SRC/$txtfile" ]; then
              grep '^PPSA' "$SRC/$txtfile" > "cheats/$txtfile" || true
            fi
          }

          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      # --------------------------
      # 5️⃣ Commit & push cheats
      #    Only stage cheats/ — never touch .github/workflows/
      # --------------------------
      - name: Commit cheats changes
        run: |
          git add cheats/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync upstream cheats (PPSA only)"
            git push origin HEAD --force-with-lease
          fi

      # --------------------------
      # 6️⃣ Zip cheats folder
      # --------------------------
      - name: Zip cheats folder
        run: zip -r cheats.zip cheats/

      # --------------------------
      # 7️⃣ Delete old rolling release
      # --------------------------
      - name: Delete old release if exists
        uses: dev-drprasad/delete-tag-and-release@v1.1
        continue-on-error: true  # safe on first run when no release exists yet
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------
      # 8️⃣ Create rolling release
      # --------------------------
      - name: Create rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "HEN Cheats (Latest)"
          token: ${{ secrets.GITHUB_TOKEN }}  # v2 uses "token", not "github_token"
          body: |
            Auto-updated PPSA cheats collection.
            Always contains the latest synced MC4, JSON, and SHN data.
          files: cheats.zip

      # --------------------------
      # 9️⃣ Download upstream README
      # --------------------------
      - name: Download upstream README
        run: |
          mkdir -p docs
          curl -fLsS \
            https://raw.githubusercontent.com/TeeKay87/HEN-Cheats-Collection/master/README.md \
            -o docs/upstream.md

      # --------------------------
      # 🔟 Build GitHub Pages dashboard
      # --------------------------
      - name: Build GitHub Pages site
        run: |
          escaped=$(sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' docs/upstream.md)
          sync_time=$(date -u '+%Y-%m-%d %H:%M UTC')

          cat > docs/index.html <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>HEN Cheats Dashboard</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 20px; max-width: 900px; }
              pre  { background: #111; color: #eee; padding: 15px;
                     white-space: pre-wrap; overflow-x: auto; border-radius: 6px; }
              h1   { color: #333; }
              a    { color: #1e88e5; }
              .meta { color: #888; font-size: 0.9em; }
            </style>
          </head>
          <body>
            <h1>HEN Cheats — Auto Synced (PPSA only)</h1>

            <h2>📥 Download Latest Cheats</h2>
            <p>
              <a href="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/cheats.zip">
                ⬇ cheats.zip (latest release)
              </a>
            </p>

            <h2>📦 Upstream README</h2>
            <pre>${escaped}</pre>

            <p class="meta">Last sync: ${sync_time}</p>
          </body>
          </html>
          HTML

      # --------------------------
      # 1️⃣1️⃣ Commit GitHub Pages update
      #     Only stage docs/ — never touch .github/workflows/
      # --------------------------
      - name: Commit Pages update
        run: |
          git add docs/

          if git diff --cached --quiet; then
            echo "No Pages update needed"
          else
            git commit -m "Auto-update GitHub Pages dashboard"
            git push origin HEAD --force-with-lease
          fi
