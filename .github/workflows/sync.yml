name: Sync HEN Cheats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream
        run: |
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      - name: Build filtered collections
        run: |
          set -e

          # Delete old cheats folder
          rm -rf cheats
          mkdir -p cheats/mc4 cheats/json cheats/shn

          SRC="upstream/cheats"

          # Function to filter folder + txt file to PPSA only
          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            # Copy only PPSA* files from folder
            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -name 'PPSA*' -exec cp {} "cheats/$folder/" \;
            fi

            # Filter txt file for PPSA lines
            if [ -f "$SRC/$txtfile" ]; then
              grep '^PPSA' "$SRC/$txtfile" > "cheats/$txtfile" || true
            fi
          }

          # Apply filtering to all categories
          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      - name: Commit and force push changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cheats

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Sync upstream cheats: MC4, JSON, SHN (PPSA only)"

          # Force push to overwrite old cheats
          git push origin HEAD --force
