- name: Generate PPSA JSON database
  run: |
    mkdir -p docs
    echo "[]" > docs/data.json

    DATE=$(date -u +%F)

    echo "[" > docs/data.json

    first=true

    for category in mc4 json shn; do
      if [ -d "cheats/$category" ]; then
        for file in cheats/$category/PPSA*; do
          [ -e "$file" ] || continue

          filename=$(basename "$file")

          ID=$(echo "$filename" | cut -d'_' -f1)
          VERSION=$(echo "$filename" | cut -d'_' -f2 | cut -d'.' -f1)

          TITLE=$(grep "$ID" cheats/$category.txt 2>/dev/null | cut -d' ' -f2- | head -n1)
          [ -z "$TITLE" ] && TITLE="Unknown"

          if [ "$first" = true ]; then
            first=false
          else
            echo "," >> docs/data.json
          fi

          cat >> docs/data.json <<EOF
{
  "date": "$DATE",
  "status": "ADDED",
  "id": "$ID",
  "version": "$VERSION",
  "title": "$TITLE",
  "category": "$category"
}
EOF

        done
      fi
    done

    echo "]" >> docs/data.json
