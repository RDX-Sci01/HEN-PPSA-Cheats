name: Sync HEN Cheats (PPSA Clean Catalog)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream repository
        run: |
          git clone --depth 1 https://github.com/TeeKay87/HEN-Cheats-Collection.git upstream

      # ----------------------------------------------------
      # BUILD PPSA COLLECTION (STRUCTURE PRESERVED)
      # ----------------------------------------------------
      - name: Build PPSA collections
        run: |
          set -e

          rm -rf cheats
          mkdir -p cheats

          SRC="upstream"

          filter_ppsa() {
            local folder="$1"
            local txtfile="$2"

            mkdir -p "cheats/$folder/files"

            # COPY FILES (NO --parents → prevents broken deep nesting)
            if [ -d "$SRC/$folder" ]; then
              find "$SRC/$folder" -type f -iname "*PPSA*" -exec cp -f {} "cheats/$folder/files/" \;
            fi

            # COPY METADATA TXT (unchanged structure)
            if [ -f "$SRC/$folder/$txtfile" ]; then
              cp "$SRC/$folder/$txtfile" "cheats/$folder/$txtfile"
            fi
          }

          filter_ppsa "mc4" "mc4.txt"
          filter_ppsa "json" "json.txt"
          filter_ppsa "shn" "shn.txt"

      # ----------------------------------------------------
      # GENERATE PPSA CATALOG
      # ----------------------------------------------------
      - name: Generate PPSA catalog
        run: |
          set -e

          OUT="cheats/GAME_TABLE.md"
          TMP="cheats/tmp.txt"
          : > "$TMP"

          get_title() {
            local id="$1"

            for f in cheats/mc4/mc4.txt cheats/json/json.txt cheats/shn/shn.txt; do
              [ -f "$f" ] || continue

              LINE=$(grep -m1 "$id" "$f" || true)

              if [ -n "$LINE" ]; then
                echo "$LINE" | sed -E 's/.*[=|]\s*//'
                return
              fi
            done

            echo "Unknown"
          }

          for category in mc4 json shn; do
            FILE_DIR="cheats/$category/files"

            [ -d "$FILE_DIR" ] || continue

            while IFS= read -r file; do
              [ -f "$file" ] || continue

              filename=$(basename "$file")

              ID=$(echo "$filename" | grep -oE 'PPSA[0-9]+' || true)
              [ -z "$ID" ] && continue

              VERSION=$(echo "$filename" | grep -oE '[0-9]{2}\.[0-9]{3}\.[0-9]{3}' | head -n1)
              [ -z "$VERSION" ] && VERSION="Unknown"

              TITLE=$(get_title "$ID")

              echo "$ID|$VERSION|$TITLE|$category" >> "$TMP"

            done < <(find "$FILE_DIR" -type f)
          done

          if [ ! -s "$TMP" ]; then
            echo "| ID | Version | Title | Category |" > "$OUT"
            echo "|----|---------|-------|----------|" >> "$OUT"
            echo "| No data found | - | - | - |" >> "$OUT"
            exit 0
          fi

          sort -t'|' -k1,1 -u "$TMP" > cheats/sorted.txt

          {
            echo "| ID | Version | Title | Category |"
            echo "|----|---------|-------|----------|"

            while IFS='|' read -r id version title category; do
              [ -z "$id" ] && continue
              echo "| $id | $version | $title | $category |"
            done < cheats/sorted.txt

            echo ""
          } > "$OUT"

      # ----------------------------------------------------
      # TIMESTAMP
      # ----------------------------------------------------
      - name: Generate timestamp
        run: |
          date -u '+🕒 Last Updated: %Y-%m-%d %H:%M UTC' > cheats/TIMESTAMP.md

      # ----------------------------------------------------
      # README INJECTION (FULL SAFE REPLACE)
      # ----------------------------------------------------
      - name: Inject catalog into README
        run: |
          set -e

          if ! grep -q "<!-- GAME_TABLE -->" README.md; then
            printf "\n## 📊 PPSA Game Catalog\n<!-- GAME_TABLE -->\n" >> README.md
          fi

          HEADER=$(awk '
            BEGIN { found=0 }
            {
              print
              if ($0 ~ /<!-- GAME_TABLE -->/) exit
            }
          ' README.md)

          {
            echo "$HEADER"
            echo ""
            cat cheats/TIMESTAMP.md
            echo ""
            cat cheats/GAME_TABLE.md
          } > README.tmp

          mv README.tmp README.md

      # ----------------------------------------------------
      # COMMIT & PUSH
      # ----------------------------------------------------
      - name: Commit and push changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md cheats

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update PPSA catalog (stable + fixed parsing)"
          git push origin HEAD --force-with-lease
