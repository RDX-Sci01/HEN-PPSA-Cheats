name: Sync Upstream README

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 1️⃣ Download upstream README (RAW version)
      - name: Fetch upstream README
        run: |
          set -e
          curl -fLsS \
            https://raw.githubusercontent.com/TeeKay87/HEN-Cheats-Collection/master/README.md \
            -o upstream.md

      # 2️⃣ Build safe injection block (line-by-line, no EOF)
      - name: Build block
        run: |
          set -e

          rm -f block.txt

          printf "%s\n" "## 📦 Upstream Cheats" >> block.txt
          printf "%s\n" "" >> block.txt

          while IFS= read -r line; do
            printf "%s\n" "$line"
          done < upstream.md >> block.txt

      # 3️⃣ Inject into README safely
      - name: Inject into README
        run: |
          set -e

          awk '
          BEGIN {
            while ((getline line < "block.txt") > 0) {
              block = block line "\n"
            }
            close("block.txt")
            skip = 0
          }

          /<!-- UPSTREAM:START -->/ {
            print
            printf "%s", block
            skip = 1
            next
          }

          /<!-- UPSTREAM:END -->/ {
            skip = 0
          }

          skip == 0 { print }
          ' README.md > README.tmp

          mv README.tmp README.md

      # 4️⃣ Commit changes
      - name: Commit
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto sync upstream README"
          git push origin HEAD
